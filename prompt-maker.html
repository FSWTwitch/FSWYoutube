<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSW Prompt Maker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #07070a;
            --bg-secondary: #111116;
            --bg-tertiary: #16161c;
            --bg-input: #0e0e13;
            --text-primary: #e8e8e8;
            --text-secondary: #c8c8c8;
            --text-tertiary: #8a8a9a;
            --text-muted: #5a5a6a;
            --border-primary: rgba(255,255,255,0.07);
            --border-secondary: rgba(255,255,255,0.05);
            --border-input: rgba(255,255,255,0.1);
            --accent-blue: #1a9fd4;
            --accent-blue-hover: #2ab8e6;
            --accent-blue-active: #0e7fc0;
            --accent-red: #1a9fd4;
            --accent-red-hover: #2ab8e6;
            --match-bg: rgba(26,159,212,0.05);
            --match-border: rgba(26,159,212,0.2);
            --notes-bg: rgba(26,159,212,0.03);
            --notes-border: rgba(26,159,212,0.15);
            --warning-bg: rgba(26,159,212,0.1);
            --shadow: rgba(0,0,0,0.5);
            --shadow-heavy: rgba(0,0,0,0.8);
        }

        /* Night mode same as default — already dark */
        body.night-mode {
            --bg-primary: #07070a;
            --bg-secondary: #111116;
            --bg-tertiary: #16161c;
            --bg-input: #0e0e13;
            --text-primary: #e8e8e8;
            --text-secondary: #c8c8c8;
            --text-tertiary: #8a8a9a;
            --text-muted: #5a5a6a;
            --border-primary: rgba(255,255,255,0.07);
            --border-secondary: rgba(255,255,255,0.05);
            --border-input: rgba(255,255,255,0.1);
            --accent-blue: #1a9fd4;
            --accent-blue-hover: #2ab8e6;
            --accent-blue-active: #0e7fc0;
            --accent-red: #1a9fd4;
            --accent-red-hover: #2ab8e6;
            --match-bg: rgba(26,159,212,0.05);
            --match-border: rgba(26,159,212,0.2);
            --notes-bg: rgba(26,159,212,0.03);
            --notes-border: rgba(26,159,212,0.15);
            --warning-bg: rgba(26,159,212,0.1);
            --shadow: rgba(0,0,0,0.5);
            --shadow-heavy: rgba(0,0,0,0.8);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #07070a;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body.night-mode { background: #07070a; }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100vw;
            max-width: 1600px;
            margin: 0 auto;
            background: var(--bg-primary);
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .header {
            background: var(--bg-secondary);
            padding: 0 28px;
            border-bottom: 1px solid var(--border-primary);
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 16px;
        }

        .header::before {
            content: '';
            display: none;
        }

        @media (max-width: 768px) {
            .header { padding: 0 16px; height: 52px; }
        }

        .night-mode-toggle {
            background: transparent;
            border: 1px solid var(--border-primary);
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            color: var(--text-tertiary);
            letter-spacing: 0.5px;
        }

        .night-mode-toggle:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }

        @media (max-width: 768px) {
            .night-mode-toggle { padding: 5px 8px; font-size: 10px; }
            .save-btn { font-size: 10px; padding: 6px 10px; }
        }

        .title-input {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 1px;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 4px 0;
            flex: 1;
            background: transparent;
            color: var(--text-primary);
            transition: border-color 0.2s;
            text-transform: uppercase;
        }

        .title-input:focus {
            outline: none;
            border-bottom-color: var(--accent-blue);
        }

        .title-input::placeholder { color: var(--text-muted); }

        @media (max-width: 768px) { .title-input { font-size: 18px; } }

        .subtitle-input {
            font-size: 12px;
            border: none;
            border-bottom: 1px solid transparent;
            padding: 3px 0;
            background: transparent;
            color: var(--text-tertiary);
            transition: border-color 0.2s;
            font-family: 'DM Sans', sans-serif;
            min-width: 120px;
        }

        .subtitle-input:focus {
            outline: none;
            border-bottom-color: var(--accent-blue);
        }

        .subtitle-input::placeholder { color: var(--text-muted); }

        .save-btn {
            background: var(--accent-blue);
            color: #07070a;
            border: none;
            padding: 8px 18px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .save-btn:hover { background: var(--accent-blue-hover); transform: translateY(-1px); }
        .save-btn:active { background: var(--accent-blue-active); transform: translateY(0); }

        .main-content {
            display: flex;
            flex: 1;
            min-height: calc(100vh - 56px);
            width: 100%;
        }

        @media (max-width: 768px) { .main-content { flex-direction: column; } }

        .sidebar {
            width: 180px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-primary);
            padding: 24px 0;
            overflow-y: auto;
            flex-shrink: 0;
            min-height: calc(100vh - 56px);
            max-height: calc(100vh - 56px);
            position: sticky;
            top: 0;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                max-height: 56px;
                padding: 0;
                display: flex;
                border-right: none;
                border-bottom: 1px solid var(--border-primary);
                overflow-x: auto;
                overflow-y: hidden;
            }
        }

        .sidebar-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-transform: uppercase;
            padding: 0 16px;
            margin-bottom: 6px;
            margin-top: 20px;
        }

        .sidebar-btn {
            width: 100%;
            padding: 10px 16px;
            background: transparent;
            border: none;
            border-left: 3px solid transparent;
            text-align: left;
            font-size: 13px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-tertiary);
            white-space: nowrap;
            flex-shrink: 0;
            letter-spacing: 0.2px;
        }

        @media (max-width: 768px) {
            .sidebar-btn {
                padding: 0 16px;
                height: 56px;
                border-left: none;
                border-bottom: 3px solid transparent;
                display: flex;
                align-items: center;
                font-size: 12px;
            }
            .sidebar-label { display: none; }
        }

        .sidebar-btn:hover { background: var(--bg-tertiary); color: var(--text-primary); }

        .sidebar-btn.active {
            background: rgba(26,159,212,0.08);
            border-left-color: var(--accent-red);
            color: var(--accent-blue);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .sidebar-btn.active {
                border-left-color: transparent;
                border-bottom-color: var(--accent-blue);
            }
        }

        .filter-section {
            padding: 16px;
            border-top: 1px solid var(--border-primary);
            margin-top: 16px;
        }

        .filter-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 10px;
            font-weight: 700;
            color: var(--text-muted);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .filter-item { display: flex; align-items: center; gap: 8px; padding: 5px 0; }

        .filter-checkbox {
            width: 15px;
            height: 15px;
            cursor: pointer;
            accent-color: var(--accent-blue);
        }

        .filter-label { font-size: 12px; color: var(--text-tertiary); cursor: pointer; }

        .show-filter-btn {
            width: 100%;
            padding: 8px;
            background: var(--accent-blue);
            color: #000;
            border: none;
            font-size: 11px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .show-filter-btn:hover { background: var(--accent-blue-hover); }

        .middle-column {
            flex: 1;
            background: var(--bg-primary);
            padding: 24px;
            padding-bottom: 100px;
            overflow-y: visible;
            min-height: calc(100vh - 56px);
        }

        @media (max-width: 768px) { .middle-column { padding: 12px 14px 100px 14px; } }

        .add-row-btn {
            position: sticky;
            top: 10px;
            float: right;
            background: var(--accent-blue);
            color: #000;
            border: none;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            white-space: nowrap;
            z-index: 10;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(26,159,212,0.25);
        }

        .add-row-btn:hover { background: var(--accent-blue-hover); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(26,159,212,0.35); }

        .section-container {
            margin-bottom: 16px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.15s;
        }
        .section-container:hover { border-color: rgba(255,255,255,0.12); }

        .section-container::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: rgba(255,255,255,0.06);
            transition: background 0.2s;
        }

        .section-container:hover::before { background: var(--accent-red); }

        .section-container.has-match-warning { border-color: var(--accent-red); }
        .section-container.has-match-warning::before { background: var(--accent-red); }

        .match-warning {
            background: var(--warning-bg);
            color: var(--accent-red);
            padding: 6px 12px 6px 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px 12px 18px;
            border-bottom: 1px solid var(--border-primary);
        }

        .section-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-secondary);
            text-transform: uppercase;
            border: 1px solid transparent;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: text;
            background: transparent;
            min-width: 80px;
            transition: all 0.2s;
        }

        .section-title:hover { border-color: var(--border-input); background: var(--bg-tertiary); }
        .section-title:focus { outline: none; border-color: var(--accent-blue); background: var(--bg-input); }

        .section-controls { display: flex; gap: 6px; flex-shrink: 0; }

        .add-line-btn {
            background: var(--accent-blue);
            color: #000;
            border: none;
            width: 26px;
            height: 26px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            font-weight: 700;
        }

        .add-line-btn:hover { background: var(--accent-blue-hover); }

        .hide-section-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-primary);
            width: 26px;
            height: 26px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .hide-section-btn:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        .section-container.collapsed .section-header { border-bottom: none; }
        .section-container.collapsed > div:not(.section-header) { display: none; }
        .section-badges { display: none; flex-wrap: wrap; gap: 4px; padding: 4px 14px 10px 36px; margin-top: 2px; align-self: flex-start; }
        .section-container.collapsed .section-badges { display: flex; }
        .section-badge { min-width: 56px; max-width: 56px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            font-size: 10px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(128,128,128,0.12);
            color: var(--text-muted);
            border: 1px solid rgba(128,128,128,0.15);
            opacity: 0.75;
        }
        .section-badge.checked { opacity: 0.35; text-decoration: line-through; }

        .commercial-line {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
            cursor: move;
            padding: 4px 8px;
            background: var(--bg-tertiary);
            border-radius: 4px;
            transition: background 0.2s;
        }

        .commercial-line.dragging { opacity: 0.4; }

        .wrestler-slots { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 5px; }
        .wrestler-slots.tag-layout, .wrestler-slots.four-way-layout, .wrestler-slots.six-man-layout { flex-direction: column; }
        .wrestler-row { display: flex; gap: 6px; }
        .wrestler-row.wide-gap { gap: 14px; }

        .wrestler-slot {
            padding: 5px 8px;
            background: var(--bg-primary);
            border: 1px dashed var(--border-input);
            border-radius: 4px;
            font-size: 11px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
            width: 80px;
            min-height: 34px;
            text-align: center;
            color: var(--text-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            word-wrap: break-word;
            line-height: 1.2;
            flex-shrink: 0;
        }

        .wrestler-slot:hover { border-color: var(--accent-blue); color: var(--accent-blue); background: rgba(26,159,212,0.05); }

        .wrestler-slot.filled {
            background: var(--bg-tertiary);
            border-style: solid;
            border-color: var(--border-input);
            color: var(--text-primary);
            font-weight: 600;
        }

        .wrestler-slot.filled:hover { border-color: var(--accent-blue); background: rgba(26,159,212,0.05); }

        .wrestler-slot.match-wrestler {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #000;
            font-weight: 700;
        }

        .wrestler-slot.match-wrestler:hover { background: var(--accent-blue-hover); }

        .wrestler-list-btn {
            width: 100%;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid var(--border-primary);
            text-align: left;
            font-size: 13px;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-secondary);
            margin-bottom: 4px;
            border-radius: 4px;
        }

        .wrestler-list-btn:hover { background: var(--bg-tertiary); border-color: var(--accent-blue); color: var(--accent-blue); }
        .wrestler-list-btn.used { opacity: 0.3; cursor: not-allowed; }
        .wrestler-list-btn.used:hover { background: transparent; border-color: var(--border-primary); color: var(--text-secondary); }

        .wrestler-list-btn.remove-btn {
            background: rgba(232,48,74,0.1);
            color: var(--accent-red);
            border-color: rgba(232,48,74,0.3);
            font-weight: 600;
        }

        .wrestler-list-btn.remove-btn:hover { background: var(--accent-red); color: white; }

        .line-container {
            margin-bottom: 6px;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 10px 14px 10px 18px;
            background: var(--bg-primary);
            border: 1px solid var(--border-secondary);
            border-radius: 6px;
            overflow: hidden;
            transition: background 0.15s, border-color 0.15s;
        }

        .line-container:hover { background: var(--bg-secondary); border-color: var(--border-primary); }

        .line-container.match-line {
            background: var(--match-bg);
            border: 1px solid var(--match-border);
        }

        .item-box {
            flex: 1;
            min-height: 40px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 0;
            min-width: 0;
        }

        .match-item-box {
            flex-direction: row;
            align-items: center;
            gap: 8px;
            padding: 0;
            flex-wrap: nowrap;
        }
        .match-row1 {
            display: contents;
        }
        .match-row2 {
            display: none;
        }
        .match-position-mobile { display: none; }
        .match-position-dropdown { display: inline-block; }

        .match-details-spacer { flex: 1; }
        .match-details-btn {
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid var(--accent-blue);
            background: transparent;
            color: var(--accent-blue);
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .match-details-btn:hover { background: var(--accent-blue); color: #000; }

        .item-content {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            min-width: 0;
            flex-wrap: nowrap;
        }

        @media (max-width: 768px) { .item-content { gap: 5px; flex-wrap: wrap; } }

        .checkbox {
            width: 15px;
            height: 15px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: var(--accent-blue);
        }

        .item-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: 'Bebas Neue', sans-serif;
        }

        .item-dropdown {
            padding: 4px 8px;
            border: 1px solid var(--border-input);
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-input);
            color: var(--text-primary);
            cursor: pointer;
            max-width: 130px;
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .item-dropdown:focus { outline: none; border-color: var(--accent-blue); }

        select { color: var(--text-primary); background: var(--bg-input); color-scheme: dark; }
        select option { color: var(--text-primary); background: #111116; }
        input[type="text"]::placeholder, textarea::placeholder { color: var(--text-muted); opacity: 1; }

        .item-text-input {
            flex: 1;
            min-width: 0;
            padding: 4px 8px;
            border: 1px solid var(--border-input);
            font-size: 12px;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-input);
            color: var(--text-primary);
            border-radius: 4px;
            transition: border-color 0.2s;
        }

        .item-text-input:focus { outline: none; border-color: var(--accent-blue); }

        .delete-section-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-primary);
            width: 26px;
            height: 26px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .delete-section-btn:hover { background: var(--accent-red); border-color: var(--accent-red); color: white; }

        .delete-line-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            width: 22px;
            height: 22px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .delete-line-btn:hover { background: var(--accent-red); color: white; }

        .right-column {
            width: 220px;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border-primary);
            padding: 20px 16px;
            overflow-y: auto;
            flex-shrink: 0;
            min-height: calc(100vh - 56px);
            max-height: calc(100vh - 56px);
            position: sticky;
            top: 0;
        }

        @media (max-width: 768px) {
            .right-column {
                width: 100%;
                border-left: none;
                border-top: 1px solid var(--border-primary);
                padding: 16px;
                max-height: 40vh;
                position: relative;
            }
        }

        .details-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 16px;
            color: var(--text-primary);
        }

        .progress-container {
            margin-bottom: 20px;
            padding: 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
        }

        .progress-label {
            font-size: 10px;
            font-weight: 700;

function buildRosterFromFSWData() {
    if (typeof wrestlers === 'undefined') return [];
    return wrestlers.filter(w => !w.incomplete).map(w => {
        let cameo = '';
        if (w.social) {
            const s = w.social.replace('@','');
            cameo = s.includes('.') ? s : 'fswyoutub.' + s.toLowerCase();
        }
        let tier = 'Tier 3';
        const rp = w.recentMatches && w.recentMatches[0] && w.recentMatches[0].rankPos;
        if (rp) { if (rp <= 3) tier = 'Tier 1'; else if (rp <= 7) tier = 'Tier 2'; }
        else if (w.rating) { if (w.rating >= 90) tier = 'Tier 1'; else if (w.rating >= 80) tier = 'Tier 2'; }
        return {
            id: 'fsw-' + w.name.replace(/\s+/g,'-').toLowerCase(),
            name: w.name, cameo: cameo, tier: tier,
            alignment: w.alignment ? (w.alignment.charAt(0).toUpperCase()+w.alignment.slice(1)) : 'Face',
            championship: w.champion || false,
        };
    });
}

function applyPickerSortFilter(roster) {

            else if (currentWrestlerSort === 'Type') { const o = {Face:1,Heel:2,Tweener:3}; list.sort((a,b) => o[a.alignment||'Face'] - o[b.alignment||'Face']); }
            else if (currentWrestlerSort === 'Champions') list.sort((a,b) => (b.championship?1:0)-(a.championship?1:0)||a.name.localeCompare(b.name));
            if (currentWrestlerFilter === 'Tier 1') list = list.filter(w => w.tier === 'Tier 1');
            else if (currentWrestlerFilter === 'Tier 2') list = list.filter(w => w.tier === 'Tier 2');

                const tones = ['frustrated, tired, resigned, desperate, and emotional', 'confident, aggressive, dominant, intense, and fire', 'cocky, arrogant, smug, dismissive, and cold', 'passionate, energetic, fired up, determined, and fierce', 'calm, methodical, calculated, composed, and sharp', 'broken, regretful, sincere, vulnerable, and raw', 'playful, sarcastic, unbothered, taunting, and light', 'nervous, hesitant, shaky, uncertain, and overwhelmed', 'cold, detached, robotic, emotionless, and icy', 'explosive, unhinged, chaotic, unpredictable, and wild', 'resentful, dismissive, wounded, defiant, and self-aware', 'angry, frustrated, pissed off, unafraid, and desperate', 'aggressive, accusatory, confrontational, defiant, and adrenaline-charged'];
                tones.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; toneSel.appendChild(o); });
                toneSel.value = s.tone || tones[0];
                toneSel.onchange = (e) => { inRingPromoState.tone = e.target.value; };
                cannedContainer.appendChild(fieldWrap('Tone:', toneSel));

                // Optional Instructions
                const optionalInput = document.createElement('input'); optionalInput.type = 'text'; optionalInput.className = 'roster-text-input'; optionalInput.placeholder = 'e.g. He is speaking directly at the camera as the crowd gives a loud cheer pop.'; optionalInput.value = s.optionalInstructions || ''; optionalInput.style.cssText = 'width:100%;';
                optionalInput.oninput = (e) => { inRingPromoState.optionalInstructions = e.target.value; };
                cannedContainer.appendChild(fieldWrap('Optional Instructions:', optionalInput));

                // Buttons
                const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px;margin-bottom:15px;margin-top:4px;';
                const generateBtn = document.createElement('button'); generateBtn.className = 'add-commercial-btn'; generateBtn.textContent = 'Generate'; generateBtn.style.marginBottom = '0';
                generateBtn.onclick = () => generateInRingPromo(id);
                const clearBtn = document.createElement('button'); clearBtn.textContent = 'Clear'; clearBtn.style.cssText = "padding:7px 14px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:4px;border:1px solid var(--border-input);background:transparent;color:var(--text-tertiary);text-transform:uppercase;";
                clearBtn.onclick = () => { inRingPromoState = { wrestler: null, attire: '', dialogue: '', tone: tones[0], optionalInstructions: '' }; renderPrompts(); };
                btnRow.appendChild(generateBtn); btnRow.appendChild(clearBtn); cannedContainer.appendChild(btnRow);

                // Output
                const outputContainer = document.createElement('div'); outputContainer.id = `canned-${id}-output`; outputContainer.style.display = 'none';
                const outputLabel = document.createElement('div'); outputLabel.style.cssText = "font-size:10px;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;"; outputLabel.textContent = 'Generated Prompt:';
                const outputTextarea = document.createElement('textarea'); outputTextarea.id = `canned-${id}-output-text`; outputTextarea.className = 'detail-textarea'; outputTextarea.style.minHeight = '120px'; outputTextarea.readOnly = true;
                const copyBtn = document.createElement('button'); copyBtn.className = 'add-commercial-btn'; copyBtn.textContent = 'Copy'; copyBtn.style.cssText = 'margin-top:8px;margin-bottom:0;';
                copyBtn.onclick = () => { navigator.clipboard.writeText(outputTextarea.value).then(() => { copyBtn.textContent = 'Copied!'; copyBtn.style.background = '#107c10'; setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.style.background = ''; }, 2000); }).catch(() => alert('Failed to copy')); };
                outputContainer.appendChild(outputLabel); outputContainer.appendChild(outputTextarea); outputContainer.appendChild(copyBtn); cannedContainer.appendChild(outputContainer);
            }
            container.appendChild(cannedContainer);
        }

        function buildCannedPrompt(container, config) {
            const { id, title, subtitle, template, label1, label2, minimized, onToggle, typeDropdown } = config;
            const cannedContainer = document.createElement('div'); cannedContainer.style.cssText = 'margin-bottom:20px;padding:15px;background:var(--bg-tertiary);border:1px solid var(--border-primary);border-radius:8px;position:relative;';
            const headerRow = document.createElement('div'); headerRow.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:10px;' + (minimized ? '' : 'margin-bottom:15px;padding-bottom:8px;border-bottom:1px solid var(--border-secondary);');
            const titleWrap = document.createElement('div'); titleWrap.style.cssText = 'flex:1;min-width:0;';
            const titleEl = document.createElement('div'); titleEl.style.cssText = "font-size:15px;font-family:'Bebas Neue',sans-serif;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-primary);"; titleEl.textContent = title;
            titleWrap.appendChild(titleEl);
            if (subtitle) { const subEl = document.createElement('div'); subEl.style.cssText = "font-size:11px;color:var(--text-muted);margin-top:2px;font-family:'DM Sans',sans-serif;"; subEl.textContent = subtitle; titleWrap.appendChild(subEl); }
            headerRow.appendChild(titleWrap);

            const menuBtn = document.createElement('button'); menuBtn.className = 'hide-section-btn'; menuBtn.textContent = minimized ? '↓' : '↑'; menuBtn.style.opacity = '0'; menuBtn.style.transition = 'opacity 0.2s'; menuBtn.onclick = onToggle;
            if (minimized) { cannedContainer.style.cursor = 'pointer'; cannedContainer.onclick = (e) => { if (e.target === menuBtn || (e.target.closest && e.target.closest('button') === menuBtn)) return; onToggle(); }; menuBtn.style.display = 'none'; } else { cannedContainer.style.cursor = ''; cannedContainer.onclick = null; menuBtn.style.display = ''; cannedContainer.onmouseenter = () => menuBtn.style.opacity = '1'; cannedContainer.onmouseleave = () => menuBtn.style.opacity = '0'; }
            headerRow.appendChild(menuBtn); cannedContainer.appendChild(headerRow);
            if (!minimized) {
                const slotsRow = document.createElement('div'); slotsRow.style.cssText = 'display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap;';
                const mkLabel = (text) => { const l = document.createElement('span'); l.style.cssText = "font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;"; l.textContent = text; return l; };
                const slot1 = document.createElement('button'); slot1.className = 'wrestler-slot'; slot1.id = `canned-${id}-wrestler1`; slot1.textContent = '+'; slot1.onclick = () => showCannedWrestlerPicker(id, 1);
                const slot2 = document.createElement('button'); slot2.className = 'wrestler-slot'; slot2.id = `canned-${id}-wrestler2`; slot2.textContent = '+'; slot2.onclick = () => showCannedWrestlerPicker(id, 2);
                const replyDropdown = document.createElement('select'); replyDropdown.className = 'item-dropdown'; replyDropdown.id = `canned-${id}-reply`;
                ['Enthusiasm', 'Focus', 'Arrogance', 'Intensity', 'Locked-In', 'Relentless', 'Determined', 'Focused', 'Coiled', 'Aggressive', 'Disciplined', 'Fearless', 'Hungry', 'Unshakable'].forEach(opt => { const option = document.createElement('option'); option.value = opt.toLowerCase(); option.textContent = opt; replyDropdown.appendChild(option); });
                if (typeDropdown) {
                    const typeSel = document.createElement('select'); typeSel.className = 'item-dropdown'; typeSel.style.cssText = 'font-size:12px;padding:4px 8px;flex-shrink:0;';
                    typeDropdown.options.forEach(opt => { const o = document.createElement('option'); o.value = opt; o.textContent = opt; typeSel.appendChild(o); });
                    typeSel.value = typeDropdown.value;
                    typeSel.onchange = (e) => typeDropdown.onChange(e.target.value);
                    slotsRow.appendChild(typeSel);
                }
                slotsRow.appendChild(mkLabel(label1 + ':')); slotsRow.appendChild(slot1); slotsRow.appendChild(mkLabel(label2 + ':')); slotsRow.appendChild(slot2); slotsRow.appendChild(mkLabel('Reply:')); slotsRow.appendChild(replyDropdown); cannedContainer.appendChild(slotsRow);
                const optRow = document.createElement('div'); optRow.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:12px;';
                const optLbl = document.createElement('span'); optLbl.style.cssText = 'font-size:11px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0;'; optLbl.textContent = 'Optional Instructions:';
                const optInput = document.createElement('input'); optInput.type = 'text'; optInput.className = 'roster-text-input'; optInput.placeholder = 'e.g. The interviewer nods as he speaks.'; optInput.style.flex = '1';
                optRow.appendChild(optLbl); optRow.appendChild(optInput); cannedContainer.appendChild(optRow);
                const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px;margin-bottom:15px;';
                const generateBtn = document.createElement('button'); generateBtn.className = 'add-commercial-btn'; generateBtn.textContent = 'Generate'; generateBtn.style.marginBottom = '0'; generateBtn.onclick = () => generateCannedPrompt(id, template, optInput.value.trim());
                const clearBtn = document.createElement('button'); clearBtn.textContent = 'Clear'; clearBtn.style.cssText = "padding:7px 14px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:4px;border:1px solid var(--border-input);background:transparent;color:var(--text-tertiary);text-transform:uppercase;";
                clearBtn.onclick = () => { slot1.textContent = '+'; slot1.classList.remove('filled'); slot2.textContent = '+'; slot2.classList.remove('filled'); replyDropdown.selectedIndex = 0; optInput.value = ''; outputContainer.style.display = 'none'; outputTextarea.value = ''; };
                btnRow.appendChild(generateBtn); btnRow.appendChild(clearBtn); cannedContainer.appendChild(btnRow);
                const outputContainer = document.createElement('div'); outputContainer.id = `canned-${id}-output`; outputContainer.style.display = 'none';
                const outputLabel = document.createElement('div'); outputLabel.style.cssText = "font-size:10px;font-weight:700;font-family:'Bebas Neue',sans-serif;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-bottom:6px;"; outputLabel.textContent = 'Generated Prompt:';
                const outputTextarea = document.createElement('textarea'); outputTextarea.id = `canned-${id}-output-text`; outputTextarea.className = 'detail-textarea'; outputTextarea.style.minHeight = '80px'; outputTextarea.readOnly = true;
                const copyBtn = document.createElement('button'); copyBtn.className = 'add-commercial-btn'; copyBtn.textContent = 'Copy'; copyBtn.style.cssText = 'margin-top:8px;margin-bottom:0;';
                copyBtn.onclick = () => { navigator.clipboard.writeText(outputTextarea.value).then(() => { copyBtn.textContent = 'Copied!'; copyBtn.style.background = '#107c10'; setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.style.background = ''; }, 2000); }).catch(() => alert('Failed to copy')); };
                outputContainer.appendChild(outputLabel); outputContainer.appendChild(outputTextarea); outputContainer.appendChild(copyBtn); cannedContainer.appendChild(outputContainer);
            }
            container.appendChild(cannedContainer);
        }

        function renderCreatedPrompts(container) {
            const inputArea = document.createElement('div'); inputArea.style.cssText = 'margin-bottom:20px;padding:15px;background:var(--bg-tertiary);border:1px solid var(--border-primary);border-radius:2px;display:flex;gap:10px;align-items:center;';
            const nameInput = document.createElement('input'); nameInput.type = 'text'; nameInput.className = 'roster-text-input'; nameInput.placeholder = 'Enter prompt title...'; nameInput.style.flex = '1'; nameInput.maxLength = 20;
            const addButton = document.createElement('button'); addButton.textContent = 'Add'; addButton.className = 'add-commercial-btn'; addButton.style.marginBottom = '0';
            addButton.onclick = () => { const name = nameInput.value.trim() || 'Untitled Prompt'; promptsData.push({ id: Date.now(), name: name.substring(0, 20), wrestlerCount: 1, wrestlers: [null, null, null, null], prompt: '' }); nameInput.value = ''; renderPrompts(); };
            nameInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') { addButton.click(); } });
            inputArea.appendChild(nameInput); inputArea.appendChild(addButton); container.appendChild(inputArea);
            promptsData.forEach((prompt, index) => {
                const pc = document.createElement('div'); pc.style.cssText = 'margin-bottom:20px;padding:15px;background:var(--bg-tertiary);border:1px solid var(--border-primary);border-radius:2px;position:relative;';
                const headerRow = document.createElement('div'); headerRow.style.cssText = 'display:flex;gap:10px;align-items:center;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border-secondary);';
                const ni = document.createElement('input'); ni.type = 'text'; ni.className = 'section-title'; ni.style.flex = '1'; ni.value = prompt.name; ni.maxLength = 20; ni.oninput = (e) => { promptsData[index].name = e.target.value.substring(0, 20); };
                const controls = document.createElement('div'); controls.style.cssText = 'display:flex;gap:8px;';
                const countDropdown = document.createElement('select'); countDropdown.className = 'item-dropdown'; countDropdown.style.width = '60px';
                for (let i = 1; i <= 4; i++) { const option = document.createElement('option'); option.value = i; option.textContent = i; countDropdown.appendChild(option); }
                countDropdown.value = prompt.wrestlerCount || 1; countDropdown.onchange = (e) => { promptsData[index].wrestlerCount = parseInt(e.target.value); renderPrompts(); };
                const menuBtn = document.createElement('button'); menuBtn.className = 'hide-section-btn'; menuBtn.textContent = '↑'; menuBtn.style.opacity = '0'; menuBtn.style.transition = 'opacity 0.2s';
                menuBtn.onclick = () => {
                    const panel = document.getElementById('detailsPanel'); openMobilePanel('Prompt Menu'); clearPanel();
                    const title = document.createElement('div'); title.className = 'details-title'; title.textContent = 'Prompt Menu'; panel.appendChild(title);
                    const menu = document.createElement('div'); menu.className = 'add-item-menu';
                    [{ label: 'Move Up', action: () => { if (index > 0) { const t = promptsData[index]; promptsData[index] = promptsData[index-1]; promptsData[index-1] = t; renderPrompts(); } } }, { label: 'Move Down', action: () => { if (index < promptsData.length-1) { const t = promptsData[index]; promptsData[index] = promptsData[index+1]; promptsData[index+1] = t; renderPrompts(); } } }, { label: 'Remove', action: () => { if (confirm(`Delete "${prompt.name}"?`)) { promptsData.splice(index, 1); renderPrompts(); } } }].forEach(opt => { const btn = document.createElement('button'); btn.className = 'add-item-menu-btn'; btn.textContent = opt.label; btn.onclick = () => { opt.action(); clearPanel(); }; menu.appendChild(btn); });
                    panel.appendChild(menu);
                };
                pc.onmouseenter = () => { menuBtn.style.opacity = '1'; }; pc.onmouseleave = () => { menuBtn.style.opacity = '0'; };
                controls.appendChild(countDropdown); controls.appendChild(menuBtn); headerRow.appendChild(ni); headerRow.appendChild(controls); pc.appendChild(headerRow);
                if (!prompt.collapsed) {
                    if (!prompt.wrestlers) { prompt.wrestlers = [null, null, null, null]; }
                    const wrestlerCount = parseInt(prompt.wrestlerCount) || 1;
                    const slotsContainer = document.createElement('div'); slotsContainer.style.cssText = 'display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;';
                    for (let i = 0; i < wrestlerCount; i++) {
                        const slotContainer = document.createElement('div'); slotContainer.style.cssText = 'display:flex;align-items:center;gap:4px;';
                        const slotBtn = document.createElement('button'); slotBtn.className = 'wrestler-slot';
                        if (prompt.wrestlers[i]) { slotBtn.classList.add('filled'); slotBtn.textContent = prompt.wrestlers[i]; } else { slotBtn.textContent = '+'; }
                        slotBtn.onclick = () => { /* simplified picker */ showCannedWrestlerPicker('created-' + index + '-' + i, 0); };
                        slotContainer.appendChild(slotBtn); slotsContainer.appendChild(slotContainer);
                    }
                    pc.appendChild(slotsContainer);
                    const promptLabel = document.createElement('div'); promptLabel.style.cssText = 'font-size:11px;font-weight:600;color:var(--text-tertiary);margin-bottom:5px;'; promptLabel.textContent = 'PROMPT:';
                    const promptTextarea = document.createElement('textarea'); promptTextarea.className = 'detail-textarea'; promptTextarea.style.minHeight = '150px'; promptTextarea.value = prompt.prompt || ''; promptTextarea.placeholder = 'Enter Sora prompt...';
                    promptTextarea.oninput = (e) => { promptsData[index].prompt = e.target.value; };
                    pc.appendChild(promptLabel); pc.appendChild(promptTextarea);
                    const btnRow = document.createElement('div'); btnRow.style.cssText = 'display:flex;gap:8px;margin-top:10px;';
                    const copyBtn = document.createElement('button'); copyBtn.className = 'add-commercial-btn'; copyBtn.textContent = 'Copy'; copyBtn.style.marginBottom = '0';
                    copyBtn.onclick = () => { navigator.clipboard.writeText(prompt.prompt).then(() => { copyBtn.textContent = 'Copied!'; copyBtn.style.background = '#107c10'; setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.style.background = ''; }, 2000); }).catch(() => alert('Failed to copy')); };
                    const clearBtn = document.createElement('button'); clearBtn.textContent = 'Clear'; clearBtn.style.cssText = "padding:7px 14px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:4px;border:1px solid var(--border-input);background:transparent;color:var(--text-tertiary);text-transform:uppercase;";
                    clearBtn.onclick = () => { promptsData[index].prompt = ''; promptsData[index].wrestlers = [null, null, null, null]; renderPrompts(); };
                    btnRow.appendChild(copyBtn); btnRow.appendChild(clearBtn); pc.appendChild(btnRow);
                }
                container.appendChild(pc);
            });
        }

        function showSponsorWrestlerPicker(onSelect, currentName) {
            const panel = document.getElementById('detailsPanel'); openMobilePanel('Select Wrestler'); clearPanel();
            const t = document.createElement('div'); t.className = 'details-title'; t.textContent = 'Select Wrestler'; panel.appendChild(t);
            appendPickerSortFilter(panel, () => showSponsorWrestlerPicker(onSelect, currentName));
            const cancelB = document.createElement('button'); cancelB.textContent = 'Cancel'; cancelB.style.cssText = "margin-bottom:12px;padding:7px 14px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:4px;border:1px solid var(--border-input);background:transparent;color:var(--text-tertiary);text-transform:uppercase;";
            cancelB.onclick = () => { closeMobilePanel(); clearPanel(); }; panel.appendChild(cancelB);
            if (currentName) {
                const clearB = document.createElement('button'); clearB.textContent = 'Clear Wrestler'; clearB.style.cssText = "display:block;margin-bottom:12px;padding:7px 14px;font-size:12px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;border-radius:4px;border:1px solid var(--accent-red);background:transparent;color:var(--accent-red);text-transform:uppercase;";
                clearB.onclick = () => { onSelect(null); closeMobilePanel(); clearPanel(); }; panel.appendChild(clearB);
            }
            const sorted = applyPickerSortFilter(rosterData);
            if (sorted.length === 0) { const e = document.createElement('p'); e.style.cssText = 'color:var(--text-muted);font-size:13px;'; e.textContent = 'No wrestlers in roster.'; panel.appendChild(e); }
            sorted.forEach(w => {
                const row = document.createElement('div'); row.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:4px;padding:8px 10px;background:var(--bg-secondary);border:1px solid var(--border-primary);border-radius:4px;cursor:pointer;transition:all 0.15s;';
                if (w.name === currentName) row.style.borderColor = 'var(--accent-blue)';
                row.onmouseenter = () => { row.style.background = 'var(--bg-tertiary)'; row.style.borderColor = 'var(--accent-blue)'; };
                row.onmouseleave = () => { row.style.background = 'var(--bg-secondary)'; if (w.name !== currentName) row.style.borderColor = 'var(--border-primary)'; };
                const nameD = document.createElement('div'); nameD.style.cssText = 'flex:1;font-size:13px;font-weight:500;color:var(--text-primary);'; nameD.textContent = w.name;
                row.appendChild(nameD);
                if (w.cameo) { const cameoD = document.createElement('div'); cameoD.style.cssText = 'font-size:11px;color:var(--text-muted);'; cameoD.textContent = w.cameo.includes('.') ? '@' + w.cameo : '@fswyoutub.' + w.cameo; row.appendChild(cameoD); }
                if (w.name === currentName) { const ck = document.createElement('span'); ck.textContent = '✓'; ck.style.cssText = 'color:#107c10;font-weight:bold;'; row.appendChild(ck); }
                row.onclick = () => { onSelect(w.name); closeMobilePanel(); clearPanel(); };
                panel.appendChild(row);
            });
        }


function init() {
    rosterData = buildRosterFromFSWData();
    try { const s = localStorage.getItem('fsw-prompts-data'); if(s) promptsData = JSON.parse(s); } catch(e) {}
    renderPrompts();
}

const _origRender = renderPrompts;
renderPrompts = function() {
    _origRender();
    try { localStorage.setItem('fsw-prompts-data', JSON.stringify(promptsData)); } catch(e) {}
};

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
