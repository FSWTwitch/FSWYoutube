<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSW Roster — First Strike Wrestling</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#07070a;
    --surface:#0f0f12;
    --surface2:#161619;
    --accent:#c0000e;
    --gold:#c8a84b;
    --text:#e8e8e8;
    --muted:#4a4a5a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{scrollbar-width:none;-ms-overflow-style:none;}
  html::-webkit-scrollbar,body::-webkit-scrollbar{display:none;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh;}

  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.025;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-size:200px;
  }

  /* ROSTER HERO BG VIDEO */
  .roster-hero-video{
    position:absolute;inset:0;z-index:0;overflow:hidden;pointer-events:none;
  }
  .roster-hero-video iframe{
    position:absolute;top:50%;left:50%;
    width:177.78vh;height:100vh;
    min-width:100%;min-height:56.25vw;
    transform:translate(-50%,-50%);
    opacity:.35;pointer-events:none;border:none;
  }

  /* NAV */
  nav{
    position:fixed;top:0;left:0;right:0;z-index:100;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 56px;
    background:linear-gradient(to bottom,rgba(0,0,0,.95) 0%,transparent 100%);
    transition:background .3s;
  }
  nav.scrolled{background:rgba(7,7,10,.97);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,.04);}
  .logo{display:flex;flex-direction:column;line-height:1;text-decoration:none;}
  .logo-top{font-family:'DM Sans',sans-serif;font-size:.62rem;letter-spacing:2px;color:var(--muted);font-weight:300;font-style:italic;}
  .logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--gold);}
  .logo-main span{color:#fff;font-size:1rem;letter-spacing:2px;}
  .nav-r{display:flex;align-items:center;gap:28px;}
  .nav-a{color:var(--muted);text-decoration:none;font-size:.82rem;font-weight:500;transition:color .2s;}
  .nav-a:hover{color:var(--text);}
  .nav-a.active{color:var(--text);}
  .nav-dim{color:var(--muted);cursor:default;font-size:.82rem;font-weight:500;}
  .sub-btn{background:var(--accent);color:#fff;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;padding:9px 20px;border-radius:5px;border:none;cursor:pointer;text-decoration:none;transition:background .2s;}
  .sub-btn:hover{background:#a0000b;}

  /* PAGE HEADER */
  .page-header{position:relative;padding:150px 56px 70px;overflow:hidden;text-align:center;min-height:50vh;display:flex;align-items:center;justify-content:center;}
  .header-bg{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 70% 60% at 50% 0%, rgba(192,0,14,.1) 0%, transparent 65%),
      linear-gradient(to bottom, transparent 0%, var(--bg) 100%);
  }
  .header-rule{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,rgba(200,168,75,.3),transparent);}
  .header-content{position:relative;z-index:1;}
  .header-eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    border:1px solid rgba(200,168,75,.25);background:rgba(200,168,75,.06);
    color:var(--gold);font-size:.65rem;font-weight:700;letter-spacing:3px;
    text-transform:uppercase;padding:5px 16px;border-radius:2px;margin-bottom:18px;
  }
  .header-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(3.5rem,9vw,7rem);
    letter-spacing:8px;color:#fff;line-height:.9;margin-bottom:14px;
  }
  .header-sub{font-size:.82rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
  .header-count{display:inline-block;margin-top:10px;font-size:.72rem;color:var(--muted);border-top:1px solid rgba(255,255,255,.06);padding-top:10px;letter-spacing:1px;}

  /* ROSTER GRID */
  .roster-wrap{position:relative;z-index:1;padding:0 48px 100px;}
  .roster-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:2px;
  }

  /* WRESTLER CARD */
  .w-card{position:relative;cursor:pointer;overflow:hidden;aspect-ratio:2/3;background:var(--surface2);}
  .w-card img.w-photo{
    width:100%;height:100%;object-fit:cover;object-position:top center;display:block;
    transition:transform .6s cubic-bezier(.4,0,.2,1);
    filter:grayscale(0%) brightness(1);
  }
  .w-card:hover img.w-photo{transform:scale(1.06);filter:grayscale(0%) brightness(1.05);}

  .w-silhouette{
    width:100%;height:100%;
    background:linear-gradient(160deg,#0f0f12 0%,#080808 100%);
    display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
  }
  .w-silhouette::before{
    content:'';position:absolute;inset:0;
    background:repeating-linear-gradient(-45deg,rgba(255,255,255,.015) 0px,rgba(255,255,255,.015) 1px,transparent 1px,transparent 20px);
  }
  .sil-icon{width:45%;opacity:.08;}

  .w-grad{
    position:absolute;inset:0;
    background:linear-gradient(to top,rgba(7,7,10,.95) 0%,rgba(7,7,10,.3) 40%,transparent 70%);
  }

  .w-play-overlay{
    position:absolute;inset:0;
    background:rgba(7,7,10,.5);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .3s;
  }
  .w-card:hover .w-play-overlay{opacity:1;}
  .view-profile-btn{
    display:inline-flex;align-items:center;
    border:none;
    color:rgba(255,255,255,.45);
    background:none;
    font-family:'DM Sans',sans-serif;
    font-size:.62rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;
    padding:0;
    transition:all .25s;
    white-space:nowrap;
  }
  .align-pill{
    display:inline-block;
    font-size:.55rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;
    padding:2px 9px;border-radius:20px;
    position:absolute;top:8px;left:8px;z-index:3;
    background:transparent;
  }
  .align-pill.heel{border:1.5px solid #e03030;color:#e03030;}
  .align-pill.face{border:1.5px solid #4ade80;color:#4ade80;}
  .w-card:hover .view-profile-btn{
    color:rgba(255,255,255,.7);
  }

  .w-card.champion::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 0 2px rgba(200,168,75,.45);
  }

  .w-info{position:absolute;bottom:0;left:0;right:0;padding:20px 18px 18px;z-index:2;}
  .w-champ-badge{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(200,168,75,.12);border:1px solid rgba(200,168,75,.3);
    color:var(--gold);font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    padding:3px 9px;border-radius:2px;margin-bottom:8px;
  }
  .w-name{
    font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;
    color:#fff;line-height:1;margin-bottom:3px;
    text-shadow:0 2px 12px rgba(0,0,0,.8);
  }
  .w-nickname{
    font-size:.6rem;color:var(--gold);font-style:italic;letter-spacing:.5px;margin-bottom:2px;
  }
  .w-subtitle{font-size:.65rem;color:rgba(232,232,232,.35);letter-spacing:1.5px;text-transform:uppercase;}

  /* MODAL */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.92);
    z-index:200;display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;transition:opacity .3s;
    padding:20px;overflow-y:auto;
  }
  .modal-bg.open{opacity:1;pointer-events:all;}
  .modal-box{
    width:96%;max-width:920px;background:var(--surface);border-radius:10px;
    overflow:hidden;transform:scale(.94);transition:transform .3s;
    border:1px solid rgba(255,255,255,.07);position:relative;
    margin:auto;
  }
  .modal-bg.open .modal-box{transform:scale(1);}
  .modal-box.champ-modal{border-color:rgba(200,168,75,.3);}

  /* TOP SECTION */
  .modal-top{display:flex;min-height:520px;}
  .modal-photo-wrap{
    width:220px;flex-shrink:0;
    background:var(--surface2);overflow:hidden;
  }
  .modal-photo-wrap .modal-photo-single{
    width:100%;height:100%;object-fit:cover;object-position:top center;display:block;
  }
  .modal-photo-ph{
    width:100%;height:100%;
    background:var(--surface2);
    display:flex;align-items:center;justify-content:center;
  }
  .modal-photo-wrap img,.modal-photo-ph{position:relative;z-index:1;}
  .modal-profile{
    flex:1;padding:28px 26px;display:flex;flex-direction:column;gap:12px;
    position:relative;overflow:hidden;
  }
  .modal-profile::before{
    content:'';position:absolute;inset:0;z-index:0;
    background-size:cover;background-position:center top;
    opacity:.18;
    background-image:var(--profile-bg);
  }
  .modal-profile > *{position:relative;z-index:1;}
  .modal-eyebrow{font-size:.6rem;color:var(--gold);letter-spacing:2.5px;text-transform:uppercase;font-weight:700;}
  .modal-name{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:3px;color:#fff;line-height:.95;margin-top:-4px;}
  .modal-champ-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(200,168,75,.1);border:1px solid rgba(200,168,75,.35);
    color:var(--gold);font-size:.62rem;font-weight:700;letter-spacing:2px;
    text-transform:uppercase;padding:4px 12px;border-radius:2px;
    width:fit-content;
  }
  .modal-stats-grid{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:1px;background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.05);border-radius:5px;overflow:hidden;
  }
  .modal-stat-item{
    background:var(--surface2);
    padding:10px 12px;text-align:center;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .modal-stat-val{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#fff;letter-spacing:1px;}
  .modal-stat-lbl{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px;}
  .modal-record{
    display:grid;grid-template-columns:repeat(4,1fr);
    gap:1px;background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.05);border-radius:5px;overflow:hidden;
  }
  .rec-item{background:var(--surface2);padding:8px 10px;text-align:center;}
  .rec-val{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#fff;letter-spacing:1px;}
  .rec-lbl{font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-top:1px;}
  .modal-stable{
    font-size:.72rem;color:rgba(232,232,232,.45);
    letter-spacing:1px;text-transform:uppercase;
    padding-left:10px;border-left:2px solid var(--accent);
  }
  .modal-bio{font-size:.82rem;line-height:1.65;color:rgba(232,232,232,.6);}
  .modal-moves{
    display:flex;flex-direction:column;gap:5px;
    border-top:1px solid rgba(255,255,255,.06);
    padding-top:10px;
  }
  .move-row{display:flex;align-items:baseline;gap:10px;padding:3px 0;}
  .move-type{font-size:.55rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);width:62px;flex-shrink:0;}
  .move-new{font-size:.8rem;font-weight:700;}
  .move-original{font-size:.68rem;color:rgba(232,232,232,.25);font-style:italic;}
  .move-row.is-super .move-type,.move-row.is-super .move-new{color:var(--gold);}
  .move-row.is-finisher .move-new{color:var(--accent);}
  .move-row.is-sig .move-new{color:var(--text);}
  .modal-endorsements{border-top:1px solid rgba(255,255,255,.06);padding-top:10px;}
  .modal-endorse-title{font-size:.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
  .modal-endorse-title::after{content:'Fictional · Entertainment Only';font-size:.52rem;color:rgba(255,255,255,.2);letter-spacing:1px;font-weight:400;}
  .endorse-tags{display:flex;flex-wrap:wrap;gap:6px;}
  .endorse-tag{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(232,232,232,.5);font-size:.7rem;padding:4px 10px;border-radius:3px;letter-spacing:.5px;}
  .modal-social{
    display:inline-flex;align-items:center;gap:7px;
    font-size:.75rem;color:var(--muted);
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.07);
    padding:6px 12px;border-radius:4px;width:fit-content;
  }

  /* VIDEO SECTION */
  .modal-video-section{border-top:1px solid rgba(255,255,255,.05);padding:18px 22px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .modal-video-label{font-size:.6rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;font-weight:700;}
  .modal-yt-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--accent);color:#fff;
    font-family:'DM Sans',sans-serif;font-weight:600;font-size:.82rem;
    padding:11px 22px;border-radius:5px;text-decoration:none;
    transition:background .2s;white-space:nowrap;
  }
  .modal-yt-btn:hover{background:#a0000b;}

  .modal-close{
    position:absolute;top:12px;right:12px;
    background:rgba(0,0,0,.7);border:none;color:#fff;
    width:34px;height:34px;border-radius:50%;cursor:pointer;
    font-size:.9rem;display:flex;align-items:center;justify-content:center;
    z-index:10;transition:background .2s;
  }
  .modal-close:hover{background:var(--accent);}

  @media(max-width:600px){
    .modal-top{flex-direction:column;}
    .modal-photo-wrap{width:100%;height:220px;}
    .modal-stats-grid{grid-template-columns:repeat(3,1fr);}
  }

  /* FOOTER */
  footer{border-top:1px solid rgba(255,255,255,.05);padding:36px 56px;display:flex;align-items:center;justify-content:space-between;font-size:.76rem;color:var(--muted);position:relative;z-index:1;}
  .foot-logo{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:3px;color:rgba(255,255,255,.2);}
  footer a{color:var(--muted);text-decoration:none;margin-left:20px;transition:color .2s;}
  footer a:hover{color:var(--text);}

  @media(max-width:768px){
    nav{padding:14px 20px;}
    .page-header{padding:110px 20px 50px;}
    .roster-wrap{padding:0 0 60px;}
    .roster-grid{grid-template-columns:repeat(2,1fr);}
    footer{padding:24px 20px;flex-direction:column;gap:12px;text-align:center;}
    footer a{margin-left:10px;}
  }
</style>
</head>

<div class="page-header">
  <div class="roster-hero-video">

<div class="roster-wrap">

<footer>
  <div>
    <div class="foot-logo">FIRST STRIKE WRESTLING</div>

  </div>

    <button class="modal-close" onclick="closeModal()">✕</button>

      <div class="modal-photo-wrap">

        <img id="modal-photo-1" class="modal-photo-single" src="" alt="" style="display:none;">
        <div id="modal-photo-ph" class="modal-photo-ph" style="display:none;">
          <svg style="width:50%;opacity:.1;" viewBox="0 0 100 180" fill="white"><ellipse cx="50" cy="28" rx="20" ry="22"/><path d="M15 75 Q50 55 85 75 L92 155 Q50 168 8 155Z"/></svg>
        </div>
      </div>
      <div class="modal-profile">
        <div class="modal-eyebrow" id="modal-eyebrow">Cinematic Wrestling Series</div>
        <div class="modal-name" id="modal-name"></div>
        <div id="modal-nickname" style="font-size:.78rem;color:var(--gold);font-style:italic;letter-spacing:1px;margin-top:-6px;display:none;"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <div class="modal-champ-badge" id="modal-champ-badge" style="display:none;"></div>

        <div class="modal-stable" id="modal-stable"></div>
        <div class="modal-bio" id="modal-bio"></div>
        <div class="modal-moves" id="modal-moves"></div>

    <!-- BOTTOM: entrance video link -->
    <div class="modal-video-section">

        <div style="font-size:.68rem;color:rgba(232,232,232,.3);margin-top:2px;letter-spacing:1px;text-transform:uppercase;">Theme Song</div>
      </div>
      <div style="display:flex;align-items:center;gap:16px;">
        <div id="modal-rating" style="text-align:center;">
          <div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:#fff;line-height:1;"></div>

<script>
// ═══════════════════════════════════════════════════
// ADD YOUR WRESTLERS HERE
// img: hosted image URL, or "" for placeholder

function makeCard(w, i){
  const el = document.createElement('div');
  el.className = `w-card${w.champion ? ' champion' : ''}`;
  el.style.animationDelay = `${i * 0.07}s`;
  el.onclick = () => openModal(w);

  const photo = w.img
    ? `<img class="w-photo" src="${w.img}" alt="${w.name}" loading="lazy">`
    : `<div class="w-silhouette">
        <svg class="sil-icon" viewBox="0 0 100 180" fill="white">
          <ellipse cx="50" cy="28" rx="20" ry="22"/>
          <path d="M15 75 Q50 55 85 75 L92 155 Q50 168 8 155Z"/>
        </svg>
       </div>`;

  el.innerHTML = `
    ${photo}
    <div class="w-grad"></div>
    <div class="w-play-overlay">
      <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
        <div class="view-profile-btn">View Profile</div>
      </div>
    </div>
    <div class="w-info">
      ${w.champion ? `<div class="w-champ-badge">👑 ${w.title}</div>` : ''}
      ${w.title && !w.champion ? `<div class="w-subtitle">${w.title}</div>` : ''}
      ${w.nickname ? `<div class="w-nickname">"${w.nickname}"</div>` : ''}
      <div class="w-name">${w.name}</div>
    </div>`;
  return el;
}

function renderRoster(){
  const grid = document.getElementById('roster-grid');
  grid.innerHTML = '';
  const sorted = [...wrestlers].sort((a,b) => a.name.localeCompare(b.name));
  sorted.forEach((w, i) => grid.appendChild(makeCard(w, i)));
  document.getElementById('roster-count').textContent =
    `${wrestlers.length} Superstar${wrestlers.length !== 1 ? 's' : ''}`;
}

function openModal(w){
  document.getElementById('modal-box').className = `modal-box${w.champion ? ' champ-modal' : ''}`;
  
  // Photo
  const ph = document.getElementById('modal-photo-ph');
  const photo1 = document.getElementById('modal-photo-1');
  const mainImg = w.popupImg || w.img;
  if(mainImg){ photo1.src = mainImg; photo1.style.display = 'block'; ph.style.display = 'none'; }
  else { photo1.style.display = 'none'; ph.style.display = 'flex'; }

  // Set rain face as bg
  const profileEl = document.querySelector('.modal-profile');
  if(w.bgImg) profileEl.style.setProperty('--profile-bg', `url(${w.bgImg})`);
  else profileEl.style.setProperty('--profile-bg', 'none');

  document.getElementById('modal-eyebrow').textContent = 'Cinematic Wrestling Series';
  document.getElementById('modal-name').textContent = w.name;
  // Alignment badge
  const alignEl2 = document.getElementById('modal-alignment');
  if(alignEl2){ alignEl2.style.display = 'none'; }


  const nickEl = document.getElementById('modal-nickname');
  if(w.nickname){ nickEl.textContent = `"${w.nickname}"`; nickEl.style.display='block'; }
  else { nickEl.style.display='none'; }



  // Champ badge
  const badge = document.getElementById('modal-champ-badge');
  if(w.champion && w.title){ badge.innerHTML = `👑 ${w.title}`; badge.style.display='inline-flex'; }
  else { badge.style.display='none'; }

  // Stats
  document.getElementById('modal-stats-grid').innerHTML = `
    <div class="modal-stat-item"><div class="modal-stat-val">${w.weight||'—'}</div><div class="modal-stat-lbl">Weight</div></div>
    <div class="modal-stat-item"><div class="modal-stat-val">${w.height||'—'}</div><div class="modal-stat-lbl">Height</div></div>
    <div class="modal-stat-item"><div class="modal-stat-val" style="font-size:.78rem;line-height:1.25;">${w.location||'—'}</div><div class="modal-stat-lbl">From</div></div>
  `;

  // Record
  const recordEl = document.getElementById('modal-record');
  if(w.record){
    const r = w.record;
    recordEl.innerHTML = `
      <div class="rec-item"><div class="rec-val">${r.singlesW}-${r.singlesL}</div><div class="rec-lbl">Singles</div></div>
      <div class="rec-item"><div class="rec-val">${r.multiW}-${r.multiL}</div><div class="rec-lbl">Multi-Man</div></div>
      <div class="rec-item"><div class="rec-val" style="color:var(--gold)">${r.titleWins}</div><div class="rec-lbl">Title Wins</div></div>
      <div class="rec-item"><div class="rec-val" style="color:var(--gold)">${r.titleDefenses}</div><div class="rec-lbl">Defenses</div></div>
    `;
    recordEl.style.display = 'grid';
  } else { recordEl.style.display = 'none'; }

  // Allies
  const alliesEl = document.getElementById('modal-allies');
  if(alliesEl){
    if(w.allies){ alliesEl.innerHTML = `<span style="color:var(--muted);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;">Allies</span> <span style="color:#4ade80;font-weight:600;">${w.allies}</span>`; alliesEl.style.display='flex'; }
    else { alliesEl.style.display='none'; }
  }

  // Rival
  const rivalEl = document.getElementById('modal-rival');
  if(w.rival){ rivalEl.innerHTML = `<span style="color:var(--muted);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;">Rival</span> <span style="color:var(--accent);font-weight:600;">${w.rival}</span>`; rivalEl.style.display='flex'; }
  else { rivalEl.style.display='none'; }

  // Stable
  const stable = document.getElementById('modal-stable');
  stable.textContent = w.stable || '';
  stable.style.display = w.stable ? 'block' : 'none';

  document.getElementById('modal-bio').textContent = w.bio || '';

  // Moves
  const movesEl = document.getElementById('modal-moves');
  if(w.finisher1 || w.finisher2 || (w.signatures && w.signatures.length)){
    let html = '';
    const moveRow = (type, cls, orig, newName) =>
      `<div class="move-row ${cls}">
        <span class="move-type">${type}</span>
        <div>
          <div class="move-new">${newName}</div>
          ${orig && orig !== newName ? `<div class="move-original">${orig}</div>` : ''}
        </div>
      </div>`;
    let leftHtml = '';
    let rightHtml = '';
    if(w.signatures) w.signatures.forEach(s => {
      const orig = Array.isArray(s) ? s[0] : '';
      const name = Array.isArray(s) ? s[1] : s;
      leftHtml += moveRow('Signature','is-sig', orig===name?'':orig, name);
    });
    if(w.superFinisher) rightHtml += moveRow('Super','is-super', w.superFinisherOrig||'', w.superFinisher);
    if(w.finisher1) rightHtml += moveRow('Finisher','is-finisher', w.finisher1Orig||'', w.finisher1);
    if(w.finisher2) rightHtml += moveRow('Finisher','is-finisher', w.finisher2Orig||'', w.finisher2);
    html = `<div style="display:flex;gap:16px;"><div style="flex:1;">${leftHtml}</div><div style="flex:1;border-left:1px solid rgba(255,255,255,.06);padding-left:16px;">${rightHtml}</div></div>`;
    movesEl.innerHTML = html;
    movesEl.style.display = 'block';
  } else { movesEl.style.display = 'none'; }

  // Endorsements
  const endorseEl = document.getElementById('modal-endorsements');
  if(w.endorsements && w.endorsements.length){
    endorseEl.innerHTML = `<div class="modal-endorse-title">Endorsements</div><div class="endorse-tags">${w.endorsements.map(e=>`<span class="endorse-tag">${e}</span>`).join('')}</div>`;
    endorseEl.style.display = 'block';
  } else { endorseEl.style.display = 'none'; }

  // Social
  const social = document.getElementById('modal-social');
  let socialHTML = '';
  if(w.social) socialHTML += `<span style="opacity:.4;margin-right:4px;">Sora</span>${w.social}`;
  if(w.twitter){
    const xUrl = w.twitterUrl || `https://x.com/${w.twitter.replace('@','')}`;
    socialHTML += `${socialHTML?'<span style="color:var(--muted);margin:0 8px;">·</span>':''}<a href="${xUrl}" target="_blank" style="color:inherit;text-decoration:none;">𝕏 ${w.twitter}</a>`;
  }
  if(w.instagram){
    const igUrl = w.instagramUrl || `https://www.instagram.com/${w.instagram}`;
    socialHTML += `${socialHTML?'<span style="color:var(--muted);margin:0 8px;">·</span>':''}<a href="${igUrl}" target="_blank" style="color:inherit;text-decoration:none;">IG ${w.instagram}</a>`;
  }
  if(socialHTML){ social.innerHTML = socialHTML; social.style.display='inline-flex';social.style.flexWrap='wrap';social.style.gap='4px';social.style.alignItems='center'; }
  else { social.style.display='none'; }

  // Silent bg video
  // Theme song
  const themeEl = document.getElementById('modal-theme-label');
  themeEl.textContent = w.theme || '';

  // Rating
  const ratingEl = document.getElementById('modal-rating');
  if(w.rating){
    const color = w.rating >= 90 ? '#c8a84b' : w.rating >= 80 ? '#4ade80' : '#e8e8e8';
    ratingEl.innerHTML = `<div style="font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:${color};line-height:1;">${w.rating}</div><div style="font-size:.55rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;">Rating</div>`;
    ratingEl.style.display = 'block';
  } else { ratingEl.style.display = 'none'; }

  // Watch button
  document.getElementById('modal-yt-btn').href = w.videoUrl || `https://youtube.com/watch?v=${w.videoId}`;

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');

  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => { if(e.key === 'Escape') closeModal(); });
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', scrollY > 50);
});

renderRoster();
</script>
